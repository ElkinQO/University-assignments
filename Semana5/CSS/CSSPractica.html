<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Registro</title>
   <link rel="stylesheet" href="styles.css">

<body>
    <header>
        <h1>Curso de Introducción al Desarrollo Web</h1>
        <p>Registro de Estudiantes</p>
    </header>

    <div id="caja">
        <section>
        <form action="enviar.html">
            <div class="caja2">
                <label for="nombre">Nombre Completo:</label>
                <input type="text" id="nombre" placeholder="Ej. Elkin Quirós">
            </div>

            <br>

            <div class="caja2">
                <label for="numero">Número:</label>
                <input type="text" id="numero" placeholder="Ej. 63440734">
            </div>

            <br>

            <div class="caja2">
                <label for="correo">Correo Electrónico:</label>
                <input type="text" id="correo" placeholder="Ej. elkin.quiros@ucr.ac.cr">
            </div>

            <br>

            <div class="caja2">
                <label"> Nivel de Conocimiento</label> <br>
                    <label for="basico">Básico</label>
                    <input type="radio" id="basico" name="nivel" value="basico"></input>
                    <label for="intermedio">Intermedio</label>
                    <input type="radio" id="intermedio" name="nivel" value="intermedio"></input>
                    <label for="avanzado">Avanzado</label>
                    <input type="radio" id="avanzado" name="nivel" value="avanzado"></input>
            </div>
            <br>
            <button type="submit" id="boton">Registrarme</button>


        </form>
        </section>
    </div>

    <footer>
        Desarrollado por Elkin Quirós Olivares - 2026
    </footer>

</body>

</html>
